<!DOCTYPE html>
<html><head><style>body{margin:0}iframe{border:0;display:block}</style></head>
<body>
<script>
  // Harness: /shot.html?page=app.html&theme=dark&token=...&name=Test%20User&view=history&w=1440&h=2000
  const q = new URLSearchParams(location.search);
  localStorage.setItem('clearchart-theme', q.get('theme') || 'light');
  if (q.get('token') || q.get('guest')) {
    localStorage.setItem('clearchart-session', JSON.stringify({
      token: q.get('token') || null,
      name: q.get('name') || 'Guest',
      email: q.get('email') || null,
      guest: !q.get('token'),
    }));
  } else {
    localStorage.removeItem('clearchart-session');
  }
  const f = document.createElement('iframe');
  f.width = q.get('w') || 1440;
  f.height = q.get('h') || 2000;
  f.src = q.get('page') || 'index.html';
  f.addEventListener('load', () => {
    const w = f.contentWindow;
    setTimeout(() => {
      const view = q.get('view');
      if (view === 'history' && w.showHistory) w.showHistory();
      if (view === 'chat' && w.toggleChat) w.toggleChat();
    }, 600);
  });
  document.body.appendChild(f);
</script>
</body></html>
